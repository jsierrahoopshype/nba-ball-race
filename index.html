<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Ball Race</title>
<link rel="stylesheet" href="css/editor.css?v=54">
</head>
<body>
  <main class="stage">
    <header class="topbar">
      <h1>NBA BALL RACE <span class="phase">PHASE 2.52</span></h1>
      <div class="controls">
        <label class="seed-field">seed
          <input id="seed" type="text" inputmode="numeric" spellcheck="false">
        </label>
        <button id="btn-race" class="btn primary">RACE</button>
        <button id="btn-replay" class="btn" disabled>REPLAY</button>
        <button id="btn-new" class="btn">NEW RACE</button>
        <button id="btn-rec" class="btn rec">&#9679; REC</button>
        <button id="btn-hq" class="btn" title="Render this race to a high-quality MP4 (offline, no dropped frames)">HQ MP4</button>
      </div>
    </header>

    <details class="editor" open>
      <summary>Race setup</summary>
      <div class="editor-body">
        <label class="count-field">balls
          <select id="ball-count">
<option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option><option>16</option><option>20</option><option>24</option><option>30</option>
          </select>
          <span class="hint">type a player or team in the picker to put a face/logo in the ball</span>
        </label>
        <label class="count-field">mode
          <select id="win-mode">
            <option value="finish">First to finish</option>
            <option value="survivor">Last ball standing</option>
          </select>
        </label>
        <label class="count-field">time limit
          <select id="time-limit">
            <option value="0">Off (race to finish)</option>
            <option value="20">20s buzzer</option>
            <option value="30">30s buzzer</option>
            <option value="45">45s buzzer</option>
            <option value="60">60s buzzer</option>
            <option value="70">70s buzzer</option>
            <option value="80">80s buzzer</option>
            <option value="90">90s buzzer</option>
          </select>
        </label>
        <label class="count-field" style="flex:1 1 240px">hook
          <input id="hook-text" type="text" maxlength="60" placeholder="Who wins the East?" style="flex:1" />
        </label>
        <label class="count-field">series
          <select id="tournament">
            <option value="1">Single race</option>
            <option value="qual">Qualifier (elimination)</option>
          </select>
        </label>
        <label class="count-field">bias
          <select id="bias-preset" title="Invisible odds-shifting presets">
            <option value="none">None (fair)</option>
            <option value="underdog">Underdog Boost</option>
            <option value="clutch">Clutch Mode</option>
            <option value="chokerisk">Choke Risk</option>
            <option value="lebronhate">LeBron Hate</option>
            <option value="mediapressure">Media Pressure</option>
          </select>
        </label>
        <label class="count-field">course
          <select id="course-preset">
            <option value="classic">Classic</option>
            <option value="chaos">Chaos</option>
            <option value="grind">Grind</option>
            <option value="pinball">Pinball</option>
            <option value="shuffle">Shuffle</option>
          </select>
        </label>
        <label class="count-field">bg
          <select id="bg-type">
            <option value="sky">Sky</option>
            <option value="court">Court</option>
            <option value="arena">Arena</option>
            <option value="gradient">Team gradient</option>
            <option value="upload">Upload…</option>
          </select>
          <input type="file" id="bg-file" accept="image/*" class="file-hidden" />
          <label for="bg-file" class="btn small" id="bg-img-btn" style="display:none">IMG</label>
        </label>
        <label class="count-field" title="Show the matchup card before the countdown">
          <input id="show-intro" type="checkbox" checked /> intro card
        </label>
        <div id="ball-rows"></div>
        <div class="template-bar">
          <button id="btn-save-tpl" class="btn small">Save template</button>
          <label for="tpl-file" class="btn small">Load template</label>
          <input type="file" id="tpl-file" accept="application/json,.json" class="file-hidden" />
          <span class="hint">saves balls, mode, hook, course &amp; background as JSON (uploaded images aren't saved)</span>
        </div>
        <div class="analysts-block">
          <div class="analysts-head">
            <strong>Analysts</strong>
            <button id="btn-add-analyst" class="btn small">+ Analyst</button>
            <select id="char-library" class="char-lib"><option value="">saved characters…</option></select>
            <span class="hint">faces become obstacles with speech bubbles. Name one, pick a face, then ★ Save to reuse it.</span>
          </div>
          <div id="analyst-rows"></div>
        </div>
      </div>
    </details>

    <div class="canvas-wrap"><canvas id="game"></canvas></div>
    <footer class="statusbar"><span id="status">ready</span></footer>
  </main>

  <datalist id="pick-list"></datalist>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="js/main.js?v=54"></script>
</body>
</html>
