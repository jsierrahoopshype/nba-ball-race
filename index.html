<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Ball Race</title>
<link rel="stylesheet" href="css/editor.css?v=17">
</head>
<body>
  <main class="stage">
    <header class="topbar">
      <h1>NBA BALL RACE <span class="phase">PHASE 2.15</span></h1>
      <div class="controls">
        <label class="seed-field">seed
          <input id="seed" type="text" inputmode="numeric" spellcheck="false">
        </label>
        <button id="btn-race" class="btn primary">RACE</button>
        <button id="btn-replay" class="btn" disabled>REPLAY</button>
        <button id="btn-new" class="btn">NEW RACE</button>
        <button id="btn-rec" class="btn rec">&#9679; REC</button>
      </div>
    </header>

    <details class="editor" open>
      <summary>Race setup</summary>
      <div class="editor-body">
        <label class="count-field">balls
          <select id="ball-count">
<option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option><option>16</option><option>20</option><option>24</option><option>30</option>
          </select>
          <span class="hint">type a player or team in the picker to put a face/logo in the ball</span>
        </label>
        <label class="count-field">mode
          <select id="win-mode">
            <option value="finish">First to finish</option>
            <option value="survivor">Last ball standing</option>
          </select>
        </label>
        <label class="count-field" style="flex:1 1 240px">hook
          <input id="hook-text" type="text" maxlength="60" placeholder="Who wins the East?" style="flex:1" />
        </label>
        <label class="count-field">bg
          <select id="bg-type">
            <option value="sky">Sky</option>
            <option value="court">Court</option>
            <option value="arena">Arena</option>
            <option value="gradient">Team gradient</option>
            <option value="upload">Upload…</option>
          </select>
          <input type="file" id="bg-file" accept="image/*" class="file-hidden" />
          <label for="bg-file" class="btn small" id="bg-img-btn" style="display:none">IMG</label>
        </label>
        <label class="count-field" title="Show the matchup card before the countdown">
          <input id="show-intro" type="checkbox" checked /> intro card
        </label>
        <div id="ball-rows"></div>
      </div>
    </details>

    <div class="canvas-wrap"><canvas id="game"></canvas></div>
    <footer class="statusbar"><span id="status">ready</span></footer>
  </main>

  <datalist id="pick-list"></datalist>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="js/main.js?v=17"></script>
</body>
</html>
