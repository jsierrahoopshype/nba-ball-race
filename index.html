<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Ball Race</title>
<link rel="stylesheet" href="css/editor.css">
</head>
<body>
  <main class="stage">
    <header class="topbar">
      <h1>NBA BALL RACE <span class="phase">PHASE 1</span></h1>
      <div class="controls">
        <label class="seed-field">
          seed
          <input id="seed" type="text" inputmode="numeric" spellcheck="false">
        </label>
        <button id="btn-race" class="btn primary">RACE</button>
        <button id="btn-replay" class="btn" disabled>REPLAY</button>
        <button id="btn-new" class="btn">NEW RACE</button>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="game"></canvas>
    </div>

    <footer class="statusbar"><span id="status">ready</span></footer>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
